version: '3'

services:
  app1:
    build: .
    environment:
      - APP_NAME=app1
    expose:
      - "3000"

  app2:
    build: .
    environment:
      - APP_NAME=app2
    expose:
      - "3000"

  app3:
    build: .
    environment:
      - APP_NAME=app3
    expose:
      - "3000"

  app4:
    build: .
    environment:
      - APP_NAME=app4
    expose:
      - "3000"

  app5:
    build: .
    environment:
      - APP_NAME=app5
    expose:
      - "3000"

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - "./nginx.conf:/etc/nginx/nginx.conf"
      - "./certificates:/etc/nginx/certificates"   # mount certificates folder
    depends_on:
      - app1
      - app2
      - app3
      - app4
      - app5